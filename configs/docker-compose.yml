version: "3.9"

services:
  # ── API Backend ─────────────────────────────────────────
  api:
    build:
      context: .
      target: base
    image: consciousai:3.0
    container_name: consciousai-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - blockchain_data:/data/blockchain
      - manifest_data:/data/manifests
      - log_data:/data/logs
    environment:
      - CONSCIOUSAI_ENV=production
      - CONSCIOUSAI_SECURITY=true
      - CONSCIOUSAI_MONITORING=true
      - CONSCIOUSAI_LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "from src.core import IntegratedConsciousnessEngine; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - consciousai-net

  # ── Redis (cache layer) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: consciousai-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - consciousai-net

  # ── PostgreSQL (persistence) ────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: consciousai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: consciousai
      POSTGRES_USER: consciousai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - consciousai-net

  # ── Prometheus (metrics) ────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: consciousai-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - consciousai-net

  # ── Grafana (dashboards) ────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: consciousai-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - consciousai-net

volumes:
  blockchain_data:
  manifest_data:
  log_data:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  consciousai-net:
    driver: bridge
