name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ── Tests (sin Numba — rápido, siempre corre) ──────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy scipy scikit-learn statsmodels
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  # ── Tests con Numba (solo en push a main, más lento) ──────────────────────
  test-numba:
    name: Tests + Numba JIT
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies + Numba
        run: |
          pip install --upgrade pip
          pip install numpy scipy scikit-learn statsmodels numba
          pip install pytest pytest-cov

      - name: Run tests with Numba
        run: pytest tests/ -v --tb=short

      - name: Run Numba benchmark
        run: python tests/benchmarks/benchmark_numba.py

  # ── Benchmark smoke test ───────────────────────────────────────────────────
  benchmark:
    name: Benchmark smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install numpy scipy scikit-learn statsmodels

      - name: Run benchmark
        run: python tests/benchmarks/benchmark_phi.py

  # ── Docker build ───────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: consciousai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
